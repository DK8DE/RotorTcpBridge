name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Build with PyInstaller
      run: pyinstaller --noconfirm --clean RotorTcpBridge.spec

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: RotorTcpBridge-Windows
        path: dist/RotorTcpBridge/
        if-no-files-found: error

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # Ohne contents:write schlagen Release + generate_release_notes mit
    # "Resource not accessible by integration" fehl (Standard-Token zu restriktiv).
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Version aus Tag (ohne führendes v)
      id: ver
      shell: pwsh
      run: |
        $t = "${{ github.ref_name }}"
        $v = $t -replace '^v',''
        "version=$v" >> $env:GITHUB_OUTPUT
        Write-Host "Release-Version: $v (Tag: $t)"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Build with PyInstaller
      run: pyinstaller --noconfirm --clean RotorTcpBridge.spec

    - name: Install Inno Setup 6
      run: choco install innosetup -y --no-progress

    - name: Compile installer (Inno Setup)
      shell: pwsh
      run: |
        $ver = "${{ steps.ver.outputs.version }}"
        $candidates = @(
          "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
          "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
        )
        $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
        if (-not $iscc) { throw "ISCC.exe nicht gefunden (Inno Setup 6)." }
        Write-Host "ISCC: $iscc /DMyAppVersion=$ver"
        & $iscc /DMyAppVersion=$ver "${{ github.workspace }}\Installer.iss"
        if ($LASTEXITCODE -ne 0) { throw "Inno Setup beendete sich mit ExitCode $LASTEXITCODE" }
        $setup = Join-Path "${{ github.workspace }}" "dist\installer\RotorTcpBridge-Setup-$ver.exe"
        if (-not (Test-Path $setup)) { throw "Installer fehlt: $setup" }

    - name: Create ZIP package
      run: |
        cd dist
        7z a -tzip RotorTcpBridge-${{ github.ref_name }}-Windows.zip RotorTcpBridge\

    - name: Generate Release Notes
      shell: pwsh
      run: |
        $ver = "${{ steps.ver.outputs.version }}"
        @"
        # RotorTcpBridge ${{ github.ref_name }}

        ## Windows

        ### Setup-Programm (empfohlen)
        - Datei: ``RotorTcpBridge-Setup-$ver.exe``
        - Installiert nach ``Program Files`` inkl. Startmenü- und optionaler Desktop-Verknüpfung.

        ### Portable (ZIP)
        - Datei: ``RotorTcpBridge-${{ github.ref_name }}-Windows.zip``
        - Entpacken und ``RotorTcpBridge.exe`` starten.

        ### Systemvoraussetzungen
        - Windows 10/11 (64-bit)
        - Python nicht erforderlich (standalone EXE)

        ### Inhalt
        - Hauptanwendung, DLLs und Ressourcen (u. a. Offline-Karten Light/Dark)

        ### Konfiguration
        Wird in ``config.json`` unter ``%APPDATA%\RotorTcpBridge\`` gespeichert.
        "@ | Set-Content -Path RELEASE_NOTES.md -Encoding utf8

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: "RotorTcpBridge ${{ github.ref_name }}"
        body_path: RELEASE_NOTES.md
        files: |
          dist/RotorTcpBridge-${{ github.ref_name }}-Windows.zip
          dist/installer/RotorTcpBridge-Setup-${{ steps.ver.outputs.version }}.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
